<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240">
  <defs>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5d5d"/>
      <stop offset="1" stop-color="#c81d28"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb84d"/>
      <stop offset="1" stop-color="#e8761f"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ec8ff"/>
      <stop offset="1" stop-color="#3a6ea8"/>
    </linearGradient>
    <radialGradient id="tire" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.55" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="170" cy="220" rx="125" ry="7" fill="rgba(0,0,0,.22)"/>

  <!-- ===== BACK WHEEL (tire only; spokes overlay) ===== -->
  <circle cx="90" cy="178" r="38" fill="url(#tire)"/>
  <circle cx="90" cy="178" r="30" fill="#2a2a2a"/>

  <!-- ===== EXHAUST ===== -->
  <path d="M115 168 L70 158 L70 172 L115 178 Z" fill="#d0d0d0" stroke="#5a5a5a" stroke-width="1.5"/>
  <circle cx="72" cy="165" r="4" fill="#1a1a1a"/>

  <!-- ===== BIKE FRAME / TANK / TAIL ===== -->
  <!-- rear cowl -->
  <path d="M75 150 C95 120, 130 105, 165 105 L195 105 L205 145 L120 168 Z"
        fill="url(#red)" stroke="#6a0d12" stroke-width="2"/>
  <!-- racing number stripe -->
  <path d="M140 130 L185 122 L188 138 L142 146 Z" fill="#fff" opacity=".85"/>
  <text x="160" y="142" font-family="Outfit, Arial, sans-serif" font-weight="900"
        font-size="14" fill="#c81d28" text-anchor="middle">36</text>

  <!-- front fairing -->
  <path d="M205 100 C245 95, 275 110, 275 138 L255 142 L235 150 L205 150 Z"
        fill="url(#red)" stroke="#6a0d12" stroke-width="2"/>
  <!-- headlight -->
  <ellipse cx="265" cy="128" rx="8" ry="6" fill="#fff7c2" stroke="#6a0d12" stroke-width="1.5"/>
  <!-- windshield -->
  <path d="M240 100 C268 92, 280 80, 270 72 L248 88 Z"
        fill="url(#visor)" opacity=".75" stroke="#6a0d12" stroke-width="1.5"/>

  <!-- seat -->
  <path d="M120 108 L165 100 L165 116 L120 124 Z" fill="#1a1a1a"/>

  <!-- handlebars -->
  <path d="M240 95 C232 82, 222 78, 215 80" fill="none" stroke="#1a1a1a"
        stroke-width="4" stroke-linecap="round"/>

  <!-- ===== RIDER LEGS (orange pants) ===== -->
  <path d="M145 128 L160 175 L186 175 L188 130 Z" fill="url(#orange)"
        stroke="#6a3300" stroke-width="2"/>
  <!-- knee pad -->
  <ellipse cx="170" cy="148" rx="9" ry="6" fill="#1a1a1a"/>
  <!-- boot -->
  <path d="M158 172 L195 168 L198 182 L160 184 Z" fill="#1a1a1a"
        stroke="#000" stroke-width="1"/>

  <!-- ===== RIDER TORSO (blue jacket) ===== -->
  <path d="M138 95 L195 86 L208 132 L142 138 Z" fill="url(#blue)"
        stroke="#0a1f5e" stroke-width="2"/>
  <!-- chest accent -->
  <path d="M155 100 L195 92 L198 108 L156 116 Z" fill="#fff" opacity=".25"/>
  <!-- arm reaching to handlebar -->
  <path d="M188 95 C210 84, 222 78, 228 80 L232 92 C220 96, 205 110, 198 118 Z"
        fill="url(#blue)" stroke="#0a1f5e" stroke-width="2"/>
  <!-- glove -->
  <ellipse cx="228" cy="84" rx="7" ry="6" fill="#1a1a1a" stroke="#000" stroke-width="1"/>

  <!-- ===== HELMET ===== -->
  <!-- helmet shell -->
  <path d="M155 70 C155 48, 178 38, 195 42 C212 46, 220 62, 218 78 L215 90 L160 96 Z"
        fill="url(#red)" stroke="#6a0d12" stroke-width="2"/>
  <!-- chin guard -->
  <path d="M160 78 C160 90, 175 96, 192 94 L210 90 L210 96 L160 100 Z"
        fill="url(#red)" stroke="#6a0d12" stroke-width="2"/>
  <!-- visor -->
  <path d="M163 64 C175 56, 200 56, 213 64 L213 80 L163 84 Z"
        fill="url(#visor)" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- visor highlight -->
  <path d="M168 62 C180 58, 196 58, 202 62 L200 68 L170 70 Z" fill="#fff" opacity=".4"/>
  <!-- white flame decoration on side of helmet -->
  <path d="M155 62 Q165 56, 172 64 Q168 66, 164 65 Q170 70, 162 72 Q160 68, 158 70 Q162 64, 155 62 Z"
        fill="#fff"/>
  <path d="M158 76 Q166 74, 170 80 Q165 82, 161 80 Z" fill="#fff"/>

  <!-- ===== FRONT WHEEL (tire only) ===== -->
  <circle cx="250" cy="178" r="38" fill="url(#tire)"/>
  <circle cx="250" cy="178" r="30" fill="#2a2a2a"/>

  <!-- fork -->
  <path d="M252 148 L260 100" stroke="#888" stroke-width="5" stroke-linecap="round"/>
</svg>
