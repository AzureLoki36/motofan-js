<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5d5d"/>
      <stop offset="1" stop-color="#c81d28"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb84d"/>
      <stop offset="1" stop-color="#e8761f"/>
    </linearGradient>
    <radialGradient id="tire" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.55" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="245" rx="170" ry="8" fill="rgba(0,0,0,.28)"/>

  <!-- BACK WHEEL -->
  <circle cx="95" cy="195" r="50" fill="url(#tire)"/>
  <circle cx="95" cy="195" r="42" fill="#1f1f1f"/>
  <circle cx="95" cy="195" r="34" fill="#262626" stroke="#9aa0a6" stroke-width="2"/>
  <g stroke="#cfd3d8" stroke-width="3" stroke-linecap="round">
    <line x1="95"  y1="163" x2="95"  y2="227"/>
    <line x1="63"  y1="195" x2="127" y2="195"/>
    <line x1="72"  y1="172" x2="118" y2="218"/>
    <line x1="72"  y1="218" x2="118" y2="172"/>
  </g>
  <circle cx="95" cy="195" r="7" fill="#c81d28" stroke="#5a0a10" stroke-width="1.5"/>

  <!-- exhaust -->
  <rect x="40" y="198" width="70" height="12" rx="5" fill="#cfd3d8" stroke="#5a5a5a" stroke-width="1.5"/>
  <circle cx="42" cy="204" r="4" fill="#111"/>

  <!-- swingarm -->
  <path d="M115 200 L295 200 L285 215 L125 215 Z" fill="#1a1a1a"/>

  <!-- main body / tank -->
  <path d="M140 180 C 135 145, 170 130, 210 128 L 285 128 C 320 128, 345 150, 348 180 L 330 200 L 130 200 Z"
        fill="url(#red)" stroke="#5a0a10" stroke-width="2.5"/>

  <!-- racing number panel -->
  <path d="M165 165 L 235 152 L 240 178 L 168 188 Z" fill="#fff" opacity=".92"/>
  <text x="200" y="178" font-family="Outfit, Arial, sans-serif" font-weight="900" font-size="20" fill="#c81d28" text-anchor="middle">36</text>

  <!-- seat -->
  <path d="M135 158 L 200 145 L 200 165 L 135 178 Z" fill="#0f0f0f"/>

  <!-- nose -->
  <path d="M295 135 C 340 130, 372 155, 365 185 L 345 195 L 320 195 L 318 145 Z"
        fill="url(#red)" stroke="#5a0a10" stroke-width="2.5"/>

  <!-- headlight -->
  <ellipse cx="354" cy="172" rx="11" ry="9" fill="#fff5b3" stroke="#5a0a10" stroke-width="2"/>
  <ellipse cx="357" cy="170" rx="3" ry="2.5" fill="#fff"/>

  <!-- windshield -->
  <path d="M308 130 C 340 110, 355 90, 342 78 L 318 118 Z"
        fill="#9ec8ff" opacity=".75" stroke="#5a0a10" stroke-width="1.5"/>

  <!-- handlebar -->
  <path d="M320 125 C 312 110, 305 100, 300 95" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>

  <!-- front fork -->
  <line x1="315" y1="155" x2="305" y2="195" stroke="#888" stroke-width="6" stroke-linecap="round"/>

  <!-- RIDER LEG -->
  <path d="M190 160 L 235 175 L 245 215 L 222 222 L 198 195 Z"
        fill="url(#orange)" stroke="#5a2e00" stroke-width="2"/>
  <ellipse cx="238" cy="182" rx="10" ry="7" fill="#111" transform="rotate(15 238 182)"/>
  <!-- boot -->
  <path d="M218 215 L 258 213 L 260 230 L 215 232 Z" fill="#111" stroke="#000" stroke-width="1"/>
  <rect x="220" y="225" width="36" height="4" fill="#333"/>

  <!-- RIDER TORSO -->
  <path d="M168 105 L 215 92 L 258 130 L 252 168 L 178 168 L 162 138 Z"
        fill="url(#blue)" stroke="#0a1f5e" stroke-width="2.5"/>
  <path d="M158 130 C 150 115, 165 105, 175 110 L 178 138 Z"
        fill="url(#blue)" stroke="#0a1f5e" stroke-width="2"/>
  <path d="M180 108 L 215 96 L 220 112 L 184 124 Z" fill="#fff" opacity=".3"/>
  <path d="M178 158 L 252 158 L 250 168 L 178 168 Z" fill="#0a1f5e"/>

  <!-- ARM -->
  <path d="M232 108 C 265 100, 290 100, 305 105 L 310 122 C 290 124, 260 138, 248 144 Z"
        fill="url(#blue)" stroke="#0a1f5e" stroke-width="2.5"/>
  <ellipse cx="265" cy="112" rx="9" ry="6" fill="#111"/>
  <ellipse cx="308" cy="115" rx="11" ry="9" fill="#111" stroke="#000" stroke-width="1.5"/>
  <line x1="305" y1="110" x2="313" y2="120" stroke="#fff" stroke-width="1.5" opacity=".6"/>

  <!-- HELMET -->
  <path d="M198 80 C 198 48, 250 35, 282 52 C 305 65, 305 95, 290 108 L 285 120 L 208 120 Z"
        fill="url(#red)" stroke="#5a0a10" stroke-width="2.5"/>
  <path d="M208 100 C 208 122, 245 125, 275 118 L 288 115 L 290 125 L 210 130 Z"
        fill="#c81d28" stroke="#5a0a10" stroke-width="2"/>
  <path d="M213 72 C 245 60, 280 65, 290 78 L 287 102 L 213 102 Z"
        fill="#1a2f5a" stroke="#000" stroke-width="2"/>
  <path d="M218 72 C 248 64, 272 66, 282 72 L 275 82 L 222 85 Z" fill="#fff" opacity=".45"/>
  <path d="M235 48 L 268 48 L 265 56 L 238 56 Z" fill="#0f0f0f"/>
  <path d="M204 60 Q 218 50, 228 58 Q 222 64, 217 63 Q 226 70, 215 75 Q 211 68, 208 71 Q 215 63, 204 60 Z"
        fill="#fff"/>
  <path d="M206 78 Q 217 76, 222 84 Q 215 87, 210 84 Z" fill="#fff" opacity=".9"/>

  <!-- FRONT WHEEL -->
  <circle cx="305" cy="195" r="50" fill="url(#tire)"/>
  <circle cx="305" cy="195" r="42" fill="#1f1f1f"/>
  <circle cx="305" cy="195" r="34" fill="#262626" stroke="#9aa0a6" stroke-width="2"/>
  <g stroke="#cfd3d8" stroke-width="3" stroke-linecap="round">
    <line x1="305" y1="163" x2="305" y2="227"/>
    <line x1="273" y1="195" x2="337" y2="195"/>
    <line x1="282" y1="172" x2="328" y2="218"/>
    <line x1="282" y1="218" x2="328" y2="172"/>
  </g>
  <circle cx="305" cy="195" r="7" fill="#c81d28" stroke="#5a0a10" stroke-width="1.5"/>
</svg>
